<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objective AI | Objective: Solved.</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #f97316; /* Tactical Orange */
            --text: #e5e7eb;
            --muted: #6b7280;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border-left: 1px solid #262626;
            position: relative;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: -4px;
            box-shadow: 0 0 15px var(--accent);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: -0.02em;
            margin: 0;
            line-height: 1;
        }

        h1 span {
            color: var(--accent);
            font-weight: 500;
        }

        .manifesto {
            margin-top: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            color: var(--text);
        }

        .details {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .cta {
            margin-top: 50px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            transition: all 0.2s;
        }

        a:hover {
            border-bottom: 1px solid var(--accent);
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { margin: 20px; padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-dot"></div>
        <h1>OBJECTIVE: <span>SOLVED.</span></h1>
        
        <div class="manifesto">
            Objective AI is a specialized venture studio architecting 
            autonomous software ecosystems. We don't build tools; 
            we engineer stabilized endpoints for complex business outcomes.
        </div>

        <div class="details">
            <span>Est. 2026</span>
            <span>California</span>
            <span>Stealth Phase</span>
        </div>

        <div class="cta">
            <a href="mailto:duy@objectivesolved.com">Connect for Inquiry</a>
        </div>
    </div>
</body>
</html>
